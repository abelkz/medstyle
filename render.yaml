services:
  - type: web
    name: medstyle
    runtime: node
    region: frankfurt
    buildCommand: |
      cd server && npm install && npx prisma generate && cd ../client && npm install && npm run build && cd ../server && npm run build
    startCommand: cd server && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: medstyle-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: STRIPE_SECRET_KEY
        value: sk_test_placeholder
      - key: CLIENT_URL
        value: https://medstyle.onrender.com

databases:
  - name: medstyle-db
    region: frankfurt
    plan: free
