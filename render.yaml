services:
  - type: web
    name: medstyle
    runtime: node
    region: oregon
    buildCommand: npm run render:build
    startCommand: npm run render:start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: STRIPE_SECRET_KEY
        value: sk_test_placeholder
      - key: CLIENT_URL
        value: https://medstyle.onrender.com
